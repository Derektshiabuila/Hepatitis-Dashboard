version: '3.8'

services:
  dashboard:
    build: .
    container_name: hepatitis-dashboard
    expose:
      - "8051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Mounts the Docker socket for Docker-out-of-Docker sibling containers (GLUE)
      - ./true_runner/results:/app/results                      # Maps preprocessed metadata and alignments from host
      - ./true_runner/data:/app/data                            # Maps IHME and WHO epidemiological datasets from host
      - jobs_data:/tmp/hep_dash_jobs                # Persists user-submitted sequence analysis jobs
    environment:
      - HEP_JOBS_DIR=/tmp/hep_dash_jobs
      - HEP_PROJECT_ROOT=/app
      - HEP_HOST_PROJECT_ROOT=${PWD}
    networks:
      - hep-net
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hepatitis-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
    networks:
      - hep-net
    restart: always

volumes:
  jobs_data:

networks:
  hep-net:
    driver: bridge
